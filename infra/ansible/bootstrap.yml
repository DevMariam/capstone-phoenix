---
# Run this ONCE, right after terraform apply, while root SSH still works.
# It creates a sudo user and disables root login — after this runs,
# connecting as root will no longer be possible (by design).
#
#   ansible-playbook bootstrap.yml

- name: Bootstrap non-root admin user and harden SSH
  hosts: k3s_cluster
  remote_user: root
  become: no
  roles:
    - bootstrap_user
